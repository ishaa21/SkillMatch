org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=true

# Disable Kotlin incremental compilation to prevent cache corruption
kotlin.incremental=false
kotlin.incremental.java=false
kotlin.incremental.js=false

# Disable R8 full mode for stability
android.enableR8.fullMode=false

# Gradle daemon and build cache settings
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.configureondemand=false
org.gradle.caching=false

# Prevent build cache issues
android.enableBuildCache=false

# Kotlin compiler settings
kotlin.compiler.execution.strategy=in-process
kotlin.daemon.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G

# Allow different JVM targets (e.g. 1.8 and 17) to coexist
kotlin.jvm.target.validation.mode=warning

# Network timeout settings (5 minutes)
systemProp.org.gradle.internal.http.socketTimeout=300000
systemProp.org.gradle.internal.http.connectionTimeout=300000
systemProp.http.socketTimeout=300000
systemProp.http.connectionTimeout=300000
